<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Font Preview</title>

    <link rel="stylesheet" href="./css/preview.css">
    <link id="dynamic-font-link" rel="stylesheet" href="">
</head>

<body>

    <div class="container">
        <header>
            <div class="title-area">
                <h2 id="font-title">正在检索字体...</h2>
                <div id="meta-pane" class="meta-pane"></div>
            </div>
            <a href="./index.html" class="back-link">← 返回主页</a>
        </header>

        <div class="controls">
            <div class="control-item">
                <label>字号</label>
                <input type="range" id="sizeRange" min="16" max="120" value="36">
                <span class="value-display" id="sizeValue">36px</span>
            </div>
            <div class="control-item">
                <label>字重</label>
                <input type="range" id="weightRange" min="100" max="900" step="100" value="400">
                <span class="value-display" id="weightValue">400</span>
            </div>

            <div class="control-item">
                <label>行高</label>
                <input type="range" id="lineHeightRange" min="1.0" max="3.0" step="0.1" value="1.6">
                <span class="value-display" id="lineHeightValue">1.6</span>
            </div>
            <div class="control-item">
                <label>字距</label>
                <input type="range" id="letterSpacingRange" min="-0.1" max="0.5" step="0.01" value="0">
                <span class="value-display" id="letterSpacingValue">0em</span>
            </div>

            <div class="control-item" style="flex: 0 0 auto;">
                <div class="btn-group" id="align-group">
                    <button class="icon-btn active" data-align="left" title="左对齐">左</button>
                    <button class="icon-btn" data-align="center" title="居中对齐">中</button>
                    <button class="icon-btn" data-align="right" title="右对齐">右</button>
                    <button class="icon-btn" data-align="justify" title="两端对齐">两端</button>
                </div>
            </div>
            <div class="control-item" style="flex: 0 0 auto;">
                <div class="btn-group">
                    <button class="icon-btn" id="btn-italic" title="斜体 (Italic)">I</button>
                    <button class="icon-btn" id="btn-underline" title="下划线 (Underline)">U</button>
                </div>
            </div>
        </div>

        <div class="preview-box" id="editor" contenteditable="true" spellcheck="false"></div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const fontId = params.get('f');

        const linkEl = document.getElementById('dynamic-font-link');
        const editor = document.getElementById('editor');
        const title = document.getElementById('font-title');
        const metaPane = document.getElementById('meta-pane');

        // ================= 数据加载逻辑 =================
        async function loadPreviewData() {
            if (!fontId) {
                title.innerText = "预览准备就绪";
                editor.innerText = "这里是开发测试模式，没有传入字体参数。\n\n落霞与孤鹜齐飞，秋水共长天一色。\nSphinx of black quartz, judge my vow.";
                return;
            }

            try {
                const response = await fetch('./fonts.data.json');
                if (!response.ok) throw new Error();
                const data = await response.json();
                const fontData = data.find(item => item.folder === `fonts/${fontId}`);

                if (!fontData) {
                    title.innerText = "未找到字体";
                    editor.innerText = "抱歉，该字体未在数据中心注册或构建失败。";
                    return;
                }

                linkEl.href = `./fonts/${fontId}/result.css`;
                editor.style.fontFamily = `"${fontData.family}", sans-serif`;
                title.innerText = `${fontData.name} - 预览`;

                renderMetaPane(fontData);

                editor.innerText = `输入文字测试 ${fontData.name}...\n\n0123456789\n落霞与孤鹜齐飞，秋水共长天一色。\nSphinx of black quartz, judge my vow.`;

            } catch (e) {
                console.error(e);
                title.innerText = "加载失败";
                editor.innerText = "读取配置中心失败，请检查网络或构建状态。";
            }
        }

        function renderMetaPane(fontData) {
            let html = '';
            if (fontData.tags && Array.isArray(fontData.tags)) {
                html += fontData.tags.map(tag => `<span class="font-tag">${tag}</span>`).join('');
            }
            if (fontData.author) {
                const authorContent = fontData.source
                    ? `<a href="${fontData.source}" target="_blank" class="meta-link">${fontData.author}</a>`
                    : fontData.author;
                html += `<span>作者: ${authorContent}</span>`;
            }
            const finalLicenseUrl = fontData.license_url || fontData.source || '#';
            const licenseTitle = fontData.license_notes || '查看授权详情';
            if (fontData.license) {
                html += `<a href="${finalLicenseUrl}" target="_blank" class="license-badge" title="${licenseTitle}">${fontData.license}</a>`;
            }
            metaPane.innerHTML = html;
        }

        // ================= 基础交互控制器 =================

        // 1. 滑块组交互
        const inputs = [
            { id: 'sizeRange', target: 'fontSize', unit: 'px' },
            { id: 'weightRange', target: 'fontWeight', unit: '' },
            { id: 'lineHeightRange', target: 'lineHeight', unit: '' },
            { id: 'letterSpacingRange', target: 'letterSpacing', unit: 'em' }
        ];

        inputs.forEach(({ id, target, unit }) => {
            const range = document.getElementById(id);
            const display = document.getElementById(id.replace('Range', 'Value'));

            range.addEventListener('input', (e) => {
                const val = e.target.value;
                editor.style[target] = val + unit;
                display.textContent = val + unit;
            });
        });

        // 2. 对齐方式交互
        const alignBtns = document.querySelectorAll('#align-group .icon-btn');
        alignBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                // 清除所有激活状态
                alignBtns.forEach(b => b.classList.remove('active'));
                // 激活当前
                e.target.classList.add('active');
                // 应用样式
                editor.style.textAlign = e.target.dataset.align;
            });
        });

        // 3. 斜体与下划线交互
        const btnItalic = document.getElementById('btn-italic');
        const btnUnderline = document.getElementById('btn-underline');

        btnItalic.addEventListener('click', (e) => {
            const isActive = e.target.classList.toggle('active');
            editor.style.fontStyle = isActive ? 'italic' : 'normal';
        });

        btnUnderline.addEventListener('click', (e) => {
            const isActive = e.target.classList.toggle('active');
            editor.style.textDecoration = isActive ? 'underline' : 'none';
        });

        // 启动
        loadPreviewData();
    </script>
</body>

</html>

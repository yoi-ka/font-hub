<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yoika's Font Hub</title>
    <link rel="stylesheet" href="./css/main.css">
    <link rel="stylesheet" href="./css/card.css">
</head>

<body class="column-list">
    <svg aria-hidden="true" style="display: none;">

        <symbol id="icon-column" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="8" y1="6" x2="21" y2="6"></line>
            <line x1="8" y1="12" x2="21" y2="12"></line>
            <line x1="8" y1="18" x2="21" y2="18"></line>
            <line x1="3" y1="6" x2="3.01" y2="6"></line>
            <line x1="3" y1="12" x2="3.01" y2="12"></line>
            <line x1="3" y1="18" x2="3.01" y2="18"></line>
        </symbol>

        <symbol id="icon-grid" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="7"></rect>
            <rect x="14" y="3" width="7" height="7"></rect>
            <rect x="14" y="14" width="7" height="7"></rect>
            <rect x="3" y="14" width="7" height="7"></rect>
        </symbol>

        <symbol id="icon-copied" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" stroke-width="1.8" fill="none"
            stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <path d="m12 15 2 2 4-4" />
            <rect width="14" height="14" x="8" y="8" rx="2" ry="2" />
            <path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2" />
        </symbol>

    </svg>

    <main>
        <header>
            <h1>Yoika's Font Hub</h1>
            <!--
            <nav class="layout-controls" aria-label="视图切换">

                <button id="btn-column" class="view-btn active" title="列表视图 (竖排)">
                    <svg>
                        <use href="#icon-column"></use>
                    </svg>
                </button>

                <button id="btn-grid" class="view-btn" title="网格视图 (横排)">
                    <svg>
                        <use href="#icon-grid"></use>
                    </svg>
                </button>

            </nav>
            -->
        </header>

        <div id="font-list"></div>
    </main>

    <script src="script.js"></script>
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>

</body>

</html>
